<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>MatGraph Admin Panel PRO</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #2c3e50; color: white; padding-top: 20px; flex-shrink: 0; }
        .menu-btn { width: 100%; background: none; border: none; color: #bdc3c7; padding: 15px; text-align: left; cursor: pointer; border-left: 4px solid transparent; }
        .menu-btn.active { background: #34495e; color: #3498db; border-left-color: #3498db; font-weight: bold; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .view { display: none; gap: 20px; height: 100%; }
        .view.active { display: flex; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; display: flex; flex-direction: column; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .filter-box { margin-bottom: 15px; padding: 10px; background: #ebf0f1; border-radius: 4px; }
        .add-btn { background: #3498db; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; overflow-y: auto; }
        li { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        li:hover { background: #f8f9fa; }
        .badge { font-size: 10px; background: #9b59b6; color: white; padding: 2px 5px; border-radius: 3px; margin-bottom: 3px; display: inline-block; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .save-btn { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        .latex-preview { background: #fff; border: 1px dashed #ccc; padding: 10px; margin-top: 5px; min-height: 30px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="text-align:center">MatGraph</h2>
    <button class="menu-btn active" onclick="zmienZakladke('chapters')">📁 Działy</button>
    <button class="menu-btn" onclick="zmienZakladke('topics')">📄 Tematy</button>
    <button class="menu-btn" onclick="zmienZakladke('subtopics')">📑 Podtematy</button>
    <button class="menu-btn" onclick="zmienZakladke('task_groups')">🗂️ Grupy Zadań</button>
    <button class="menu-btn" onclick="zmienZakladke('tasks')">📝 Zadania</button>
</div>

<div class="content">
    <template id="view-template">
        <div class="view">
            <div class="card">
                <div class="header-row">
                    <h2 class="title"></h2>
                    <button class="add-btn" onclick="nowyRekord()">+ Dodaj</button>
                </div>
                <div class="filter-box">
                    <label class="filter-label">Filtruj wg rodzica:</label>
                    <select class="filter-select" onchange="odswiezInterfejs()"></select>
                </div>
                <ul class="item-list"></ul>
            </div>
            <div class="card">
                <h2 class="form-title">Edytuj / Dodaj</h2>
                <form class="main-form">
                    <input type="hidden" class="field-id">
                    <div class="form-fields"></div>
                    <button type="submit" class="save-btn">Zapisz w bazie</button>
                    <div class="status"></div>
                </form>
            </div>
        </div>
    </template>

    <div id="views-container"></div>
</div>

<script>
    const API_URL = 'http://localhost:5000/api';
    let DB = {};
    let currentTable = 'chapters';

    const CONFIG = {
        chapters: { title: "Działy", parent: null, fields: [{n: 'name', l: 'Nazwa', t: 'text'}] },
        topics: { title: "Tematy", parent: 'chapter_id', parentTable: 'chapters', fields: [{n: 'chapter_id', l: 'Dział', t: 'select'}, {n: 'name', l: 'Nazwa', t: 'text'}, {n: 'video_url', l: 'Video URL', t: 'text'}] },
        subtopics: { title: "Podtematy", parent: 'topic_id', parentTable: 'topics', fields: [{n: 'topic_id', l: 'Temat', t: 'select'}, {n: 'name', l: 'Nazwa', t: 'text'}, {n: 'importance', l: 'Ważność (1-5)', t: 'number'}] },
        task_groups: { title: "Grupy Zadań", parent: 'subtopic_id', parentTable: 'subtopics', fields: [{n: 'subtopic_id', l: 'Podtemat', t: 'select'}, {n: 'name', l: 'Nazwa', t: 'text'}] },
        tasks: { title: "Zadania", parent: 'task_group_id', parentTable: 'task_groups', fields: [{n: 'task_group_id', l: 'Grupa', t: 'select'}, {n: 'content', l: 'Treść', t: 'latex'}, {n: 'difficulty_level', l: 'Trudność', t: 'enum'}, {n: 'correct_answer', l: 'Odp (LaTeX)', t: 'latex-small'}, {n: 'video_url', l: 'Video URL', t: 'text'}] }
    };

    function zmienZakladke(table) {
        currentTable = table;
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(CONFIG[table].title.toLowerCase())));
        renderujWidok();
    }

    async function wczytajBaze() {
        const res = await fetch(`${API_URL}/data`);
        DB = await res.json();
        renderujWidok();
    }

    function renderujWidok() {
        const container = document.getElementById('views-container');
        container.innerHTML = '';
        const temp = document.getElementById('view-template').content.cloneNode(true);
        const view = temp.querySelector('.view');
        view.classList.add('active');

        const conf = CONFIG[currentTable];
        view.querySelector('.title').innerText = conf.title;
        
        // Setup Filtra
        const fSelect = view.querySelector('.filter-select');
        if(!conf.parent) view.querySelector('.filter-box').style.display = 'none';
        else {
            fSelect.innerHTML = '<option value="">Wszystkie</option>';
            DB[conf.parentTable].forEach(p => fSelect.innerHTML += `<option value="${p.id}">${p.name || p.id.substring(0,8)}</option>`);
        }

        // Setup Pól Formularza
        const fContainer = view.querySelector('.form-fields');
        conf.fields.forEach(f => {
            let html = `<div class="form-group"><label>${f.l}:</label>`;
            if(f.t === 'text' || f.t === 'number') html += `<input type="${f.t}" id="f-${f.n}">`;
            else if(f.t === 'select') {
                html += `<select id="f-${f.n}"><option value="">Wybierz...</option>`;
                DB[conf.parentTable].forEach(p => html += `<option value="${p.id}">${p.name}</option>`);
                html += `</select>`;
            } else if(f.t === 'enum') {
                html += `<select id="f-${f.n}"><option value="Easy">Easy</option><option value="Medium">Medium</option><option value="Hard">Hard</option><option value="Very Hard">Very Hard</option></select>`;
            } else if(f.t === 'latex' || f.t === 'latex-small') {
                html += `<textarea id="f-${f.n}" rows="${f.t==='latex'?4:1}" oninput="renderujLatex('f-${f.n}', 'p-${f.n}')"></textarea><div id="p-${f.n}" class="latex-preview"></div>`;
            }
            fContainer.innerHTML += html + `</div>`;
        });

        view.querySelector('.main-form').onsubmit = (e) => zapiszDane(e);
        container.appendChild(view);
        odswiezInterfejs();
    }

    function odswiezInterfejs() {
        const filterVal = document.querySelector('.filter-select').value;
        const conf = CONFIG[currentTable];
        const list = document.querySelector('.item-list');
        list.innerHTML = '';

        const dane = filterVal ? DB[currentTable].filter(x => x[conf.parent] === filterVal) : DB[currentTable];

        dane.forEach(item => {
            const li = document.createElement('li');
            const parentName = item[conf.parentTable]?.name || '';
            li.innerHTML = `${parentName ? `<span class="badge">${parentName}</span><br>` : ''} <strong>${item.name || item.content?.substring(0,40) + '...'}</strong>`;
            li.onclick = () => zaladuj(item);
            list.appendChild(li);
        });
    }

    function nowyRekord() {
        document.querySelector('.main-form').reset();
        document.querySelector('.field-id').value = '';
        document.querySelectorAll('.latex-preview').forEach(p => p.innerHTML = '');
        document.querySelector('.form-title').innerText = "Nowy Rekord: " + CONFIG[currentTable].title;
    }

    function zaladuj(item) {
        nowyRekord();
        document.querySelector('.field-id').value = item.id;
        document.querySelector('.form-title').innerText = "Edycja: " + (item.name || "Elementu");
        CONFIG[currentTable].fields.forEach(f => {
            const el = document.getElementById(`f-${f.n}`);
            if(el) {
                el.value = item[f.n] || '';
                if(f.t.includes('latex')) renderujLatex(`f-${f.n}`, `p-${f.n}`);
            }
        });
    }

    async function zapiszDane(e) {
        e.preventDefault();
        const id = document.querySelector('.field-id').value;
        const payload = {};
        CONFIG[currentTable].fields.forEach(f => payload[f.n] = document.getElementById(`f-${f.n}`).value || null);
        
        const path = id ? `update/${currentTable}/${id}` : `create/${currentTable}`;
        const res = await fetch(`${API_URL}/${path}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            alert("Zapisano!");
            await wczytajBaze();
        }
    }

    function renderujLatex(inputId, previewId) {
        const text = document.getElementById(inputId).value;
        const prev = document.getElementById(previewId);
        prev.innerText = text || "Podgląd...";
        if(window.renderMathInElement) {
            renderMathInElement(prev, { delimiters: [{left:'$$', right:'$$', display:true}, {left:'$', right:'$', display:false}], throwOnError:false });
        }
    }

    wczytajBaze();
</script>
</body>
</html>
